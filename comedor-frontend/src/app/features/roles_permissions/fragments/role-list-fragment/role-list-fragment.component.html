<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
  <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4">
    <h5 class="fw-bold text-dark mb-3">Roles registrados</h5>
    <div class="d-flex gap-3 align-items-center">
      <div class="input-icon flex-grow-1">
        <input
          class="form-control custom-search"
          placeholder="Buscar rol..."
          (input)="onSearch($event)"
        />
      </div>
      <select class="form-select" style="max-width: 140px" (change)="onStatusChange($event)">
        <option value="TODOS">Todos</option>
        <option value="ACTIVO">Activos</option>
        <option value="INACTIVO">Inactivos</option>
      </select>
    </div>
  </div>

  <div class="card-body px-4 pb-4">
    @if (loading()) {
      <div class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>
    } @else {
      <div class="d-flex flex-column gap-2 mt-2">
        @for (role of roles(); track role.role_id) {
          <div
            class="d-flex justify-content-between align-items-center border rounded-3 px-3 py-2 role-item"
            (click)="openRole(role)"
            style="cursor: pointer"
          >
            <div class="d-flex align-items-center gap-2">
              <div
                class="bg-primary bg-opacity-10 text-primary rounded d-flex align-items-center justify-content-center"
                style="width: 32px; height: 32px"
              >
                <svg
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  viewBox="0 0 24 24"
                  width="16"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"
                  ></path>
                </svg>
              </div>
              <span class="fw-semibold text-dark">{{ role.name }}</span>
            </div>
            <span
              class="badge rounded-pill"
              [class]="
                role.status === 'ACTIVO'
                  ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25'
                  : 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25'
              "
            >
              {{ role.status }}
            </span>
          </div>
        } @empty {
          <div class="text-center py-4 text-muted">No se encontraron roles.</div>
        }
      </div>
    }
  </div>
</div>

<app-role-detail-modal />
