<div class="modal fade" id="categoryDetailModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
      <div class="modal-header bg-light border-bottom-0 pt-4 pb-2 px-4">
        <div class="d-flex align-items-center gap-3">
          <div
            class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center"
            style="width: 44px; height: 44px"
          >
            <svg
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              viewBox="0 0 24 24"
              width="22"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"
              ></path>
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"></path>
            </svg>
          </div>
          <h5 class="modal-title fw-bold text-dark mb-0">Detalle Categoría</h5>
        </div>
        <button
          type="button"
          class="btn-close shadow-none"
          data-bs-dismiss="modal"
          (click)="close()"
        ></button>
      </div>

      <div class="modal-body px-4 py-4">
        @if (category(); as category) {
          <div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
            <h4 class="fw-bold text-dark mb-0">{{ category.name }}</h4>
            <span
              class="badge rounded-pill px-3 py-2"
              [class]="
                category.status === 'INACTIVO'
                  ? 'bg-danger bg-opacity-10 text-danger'
                  : 'bg-success bg-opacity-10 text-success'
              "
            >
              {{ category.status }}
            </span>
          </div>
        }
      </div>

      <div
        class="modal-footer bg-light border-top-0 px-4 py-3 d-flex justify-content-between align-items-center"
      >
        <div></div>
        @if (authState.hasPermission('CATEGORY_CHANGE_STATUS')) {
          @if (category()?.status === 'INACTIVO') {
            <button
              class="btn btn-outline-success rounded-pill px-4 fw-medium"
              (click)="changeStatus('ACTIVO')"
              [disabled]="loading()"
            >
              @if (loading()) {
                <span class="spinner-border spinner-border-sm"></span>
              }
              Activar
            </button>
          } @else {
            <button
              class="btn btn-outline-danger rounded-pill px-4 fw-medium"
              (click)="changeStatus('INACTIVO')"
              [disabled]="loading()"
            >
              @if (loading()) {
                <span class="spinner-border spinner-border-sm"></span>
              }
              Desactivar
            </button>
          }
        }
      </div>
    </div>
  </div>
</div>
