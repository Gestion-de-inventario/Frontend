<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
  <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4">
    <h5 class="fw-bold text-dark mb-3">Categorías</h5>
    <div class="d-flex gap-3 align-items-center">
      <div class="input-icon flex-grow-1">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path></svg>
        <input class="form-control custom-search" placeholder="Buscar categoría..."
          [ngModel]="search()" (ngModelChange)="search.set($event)" />
      </div>
      <div class="form-check form-switch d-flex align-items-center gap-2 m-0">
        <input type="checkbox" class="form-check-input mt-0 custom-switch" id="activeCategoryFilter"
          [checked]="onlyActive()" (change)="onlyActive.set($any($event.target).checked)" />
        <label class="form-check-label text-muted fw-medium" for="activeCategoryFilter" style="cursor:pointer;">Solo activos</label>
      </div>
    </div>
  </div>

  <div class="card-body px-4 pb-4">
    <div class="d-flex flex-column gap-2 mt-2">
      @for (category of filteredCategories(); track category.id) {
        <div class="d-flex justify-content-between align-items-center border rounded-3 px-3 py-2 category-item" (click)="openCategory(category)" style="cursor:pointer;">
          <div class="d-flex align-items-center gap-2">
            <div class="bg-primary bg-opacity-10 text-primary rounded d-flex align-items-center justify-content-center" style="width:32px;height:32px;">
              <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="16"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"></path></svg>
            </div>
            <span class="fw-semibold text-dark">{{ category.name }}</span>
          </div>
          <span class="badge rounded-pill" [class]="category.status === 'INACTIVO' ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25' : 'bg-success bg-opacity-10 text-success border border-success border-opacity-25'">
            {{ category.status }}
          </span>
        </div>
      } @empty {
        <div class="text-center py-4 text-muted">No se encontraron categorías.</div>
      }
    </div>
  </div>
</div>

<app-category-detail-modal />
