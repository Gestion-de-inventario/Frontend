<div class="container-fluid py-4">
  @if (!canList && !canCreate) {
    <div class="d-flex flex-column justify-content-center align-items-center mt-5 text-center">
      <div class="bg-danger bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="40" height="40" class="text-danger">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"></path>
        </svg>
      </div>
      <h4 class="fw-bold text-dark mb-2">Acceso Denegado</h4>
      <p class="text-muted mb-4">No tienes los permisos necesarios para gestionar el inventario.</p>
      <a routerLink="/dashboard" class="btn btn-primary px-4 py-2 shadow-sm rounded-pill fw-medium">Volver al Dashboard</a>
    </div>
  } @else {
    <div class="d-flex flex-column gap-4">
      
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
          <h3 class="fw-bold text-dark mb-1">Gestión de Productos</h3>
          <p class="text-muted mb-0">Administra el inventario y las alertas de stock</p>
        </div>
        
        @if (canCreate) {
          <app-product-create-fragment />
        }
      </div>

      @if (canList) {
        <app-product-list-fragment />
      }
    </div>
  }
</div>
