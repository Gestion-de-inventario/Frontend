<div class="card border-0 shadow-sm rounded-4 mb-4">
  <div class="card-body">
    <div class="row align-items-center">
      <div class="col-auto">
        <label class="fw-semibold mb-0">Módulo:</label>
      </div>
      <div class="col-md-4">
        <select class="form-select" [value]="currentModule" (change)="changeModule($event)">
          @if (canViewProducts) {
            <option value="products">Productos</option>
          }
          @if (canViewDishes) {
            <option value="dishes">Producto Boom</option>
          }
        </select>
      </div>
    </div>
  </div>
</div>

<router-outlet />
