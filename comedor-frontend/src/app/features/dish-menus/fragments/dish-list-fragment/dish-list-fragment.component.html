<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
  <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4">
    <h5 class="fw-bold text-dark mb-3">Producto Boom</h5>
    <div class="d-flex gap-3 align-items-center">
      <div class="input-icon flex-grow-1">
        <svg
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          width="16"
          height="16"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
          ></path>
        </svg>
        <input
          class="form-control custom-search"
          placeholder="Buscar plato..."
          [ngModel]="search()"
          (ngModelChange)="search.set($event)"
        />
      </div>
      <div class="form-check form-switch d-flex align-items-center gap-2 m-0">
        <input
          type="checkbox"
          class="form-check-input mt-0 custom-switch"
          id="activeDishFilter"
          [checked]="onlyActive()"
          (change)="onlyActive.set($any($event.target).checked)"
        />
        <label
          class="form-check-label text-muted fw-medium"
          for="activeDishFilter"
          style="cursor: pointer"
          >Solo activos</label
        >
      </div>
    </div>
  </div>

  <div class="card-body px-4 pb-4">
    @if (loading()) {
      <div class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>
    } @else {
      <div class="d-flex flex-column gap-2 mt-2">
        @for (dish of filteredDishes(); track dish.id) {
          <div
            class="d-flex justify-content-between align-items-center border rounded-3 px-3 py-2"
            (click)="openDish(dish)"
            style="cursor: pointer"
          >
            <div class="d-flex align-items-center gap-2">
              <div
                class="bg-primary bg-opacity-10 text-primary rounded d-flex align-items-center justify-content-center"
                style="width: 32px; height: 32px"
              >
                <svg
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  viewBox="0 0 24 24"
                  width="16"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 16.875h3.375c.621 0 1.125-.504 1.125-1.125V14.25m-9 2.625H6.375c-.621 0-1.125-.504-1.125-1.125V14.25m9 2.625v1.5m-9-1.5v1.5m0 0H4.5m10.5 0H19.5"
                  ></path>
                </svg>
              </div>
              <div>
                <span class="fw-semibold text-dark d-block">{{ dish.name }}</span>
                <small class="text-muted">{{ dish.supplies.length }} insumos</small>
              </div>
            </div>
            <span
              class="badge rounded-pill"
              [class]="
                dish.status === 'INACTIVO'
                  ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25'
                  : 'bg-success bg-opacity-10 text-success border border-success border-opacity-25'
              "
            >
              {{ dish.status }}
            </span>
          </div>
        } @empty {
          <div class="text-center py-4 text-muted">No se encontraron productos boom.</div>
        }
      </div>
    }
  </div>
</div>

<app-dish-detail-modal />
