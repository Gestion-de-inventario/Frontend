<div class="mb-3">
  <button class="btn btn-primary rounded-pill px-4 fw-medium d-flex align-items-center gap-2" (click)="openModal()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
    Nuevo Plato
  </button>
</div>

<div class="modal fade" id="createDishModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
      <div class="modal-header bg-light border-bottom-0 pt-4 pb-2 px-4">
        <div class="d-flex align-items-center gap-3">
          <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width:40px;height:40px;">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="20"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 16.875h3.375c.621 0 1.125-.504 1.125-1.125V14.25m-9 2.625H6.375c-.621 0-1.125-.504-1.125-1.125V14.25m9 2.625v1.5m-9-1.5v1.5m0 0H4.5m10.5 0H19.5"></path></svg>
          </div>
          <h5 class="modal-title fw-bold text-dark mb-0">Nuevo Plato</h5>
        </div>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" (click)="resetForm()"></button>
      </div>

      <div class="modal-body px-4 py-4">
        <form [formGroup]="form" class="d-flex flex-column gap-3">
          <div>
            <label class="form-label fw-semibold text-dark small">Nombre del plato <span class="text-danger">*</span></label>
            <input type="text" class="form-control custom-input" formControlName="name"
              placeholder="Ej: Arroz con pollo, Lentejas..."
              [class.is-invalid]="form.controls.name.touched && form.controls.name.invalid" />
            @if (form.controls.name.touched && form.controls.name.invalid) {
              <small class="text-danger">Este campo es obligatorio</small>
            }
          </div>

          <div>
            <label class="form-label fw-semibold text-dark small">Insumos <span class="text-danger">*</span></label>
            
            <div class="d-flex flex-column gap-3">
              @for (supply of supplies; track $index) {
                <div class="border rounded-3 p-3 bg-light">
                  <div class="d-flex gap-2 align-items-end">
                    
                    <div class="flex-grow-1">
                      <label class="form-label small text-muted mb-1 d-block">Producto</label>
                      <select class="form-select" 
                              [(ngModel)]="supply.productId" 
                              [ngModelOptions]="{standalone: true}">
                        <option [ngValue]="null" disabled>Seleccionar producto</option>
                        @for (product of products; track product.id) {
                          <option [value]="product.id">
                            {{ product.name }} ({{ product.unit }})
                          </option>
                        }
                      </select>
                    </div>

                    <div style="min-width: 115px;">
                      <label class="form-label small text-muted mb-1 d-block">Cantidad</label>
                      <input type="number" 
                             class="form-control" 
                             placeholder="Cant."
                             [(ngModel)]="supply.quantityNeeded" 
                             [ngModelOptions]="{standalone: true}" />
                    </div>

                    <button type="button" 
                            class="btn btn-outline-danger rounded-circle d-flex align-items-center justify-content-center mt-4"
                            style="width: 42px; height: 42px; flex-shrink: 0;"
                            (click)="removeSupply($index)">
                      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="18" height="18">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                      </svg>
                    </button>
                  </div>
                </div>
              }

              <button type="button" 
                      class="btn btn-outline-primary btn-sm rounded-pill px-4 align-self-start"
                      (click)="addSupply()">
                + Agregar insumo
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer bg-light border-top-0 px-4 py-3 d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary rounded-pill px-4 fw-medium" data-bs-dismiss="modal" (click)="resetForm()">Cancelar</button>
        <button class="btn btn-primary rounded-pill px-4 fw-medium" [disabled]="form.invalid || supplies.length === 0 || loading" (click)="create()">
          @if (loading) { <span class="spinner-border spinner-border-sm"></span> Creando... } @else { Crear }
        </button>
      </div>
    </div>
  </div>
</div>
