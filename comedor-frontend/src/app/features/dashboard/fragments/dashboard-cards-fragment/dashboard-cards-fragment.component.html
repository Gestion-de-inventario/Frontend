@if (data()) {
<div class="row g-4">
  <div class="col-12 col-md-4">
    <div class="card border-0 shadow-sm rounded-4 h-100">
      <div class="card-body p-4 d-flex align-items-center gap-3">
        <div class="bg-success bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 56px; height: 56px;">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="28" height="28" class="text-success">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <div>
          <p class="text-muted mb-1 fw-medium">Ingresos del Mes</p>
          <h3 class="fw-bold text-dark mb-0">{{ data()!.totalIngresos | currency:'PEN':'symbol':'1.2-2' }}</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="card border-0 shadow-sm rounded-4 h-100">
      <div class="card-body p-4 d-flex align-items-center gap-3">
        <div class="bg-danger bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 56px; height: 56px;">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="28" height="28" class="text-danger">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"></path>
          </svg>
        </div>
        <div>
          <p class="text-muted mb-1 fw-medium">Egresos del Mes</p>
          <h3 class="fw-bold text-dark mb-0">{{ data()!.totalEgresos | currency:'PEN':'symbol':'1.2-2' }}</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="card border-0 shadow-sm rounded-4 h-100">
      <div class="card-body p-4 d-flex align-items-center gap-3">
        
        <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" 
             [class]="data()!.balanceNeto >= 0 ? 'bg-primary bg-opacity-10' : 'bg-danger bg-opacity-10'"
             style="width: 56px; height: 56px;">
          
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="28" height="28"
               [class]="data()!.balanceNeto >= 0 ? 'text-primary' : 'text-danger'">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13h2.25l2.25 9 3.75-18 2.25 9H21"></path>
          </svg>
        </div>
        
        <div>
          <p class="text-muted mb-1 fw-medium">Balance Neto</p>
          <h3 class="fw-bold mb-0" [class]="data()!.balanceNeto >= 0 ? 'text-dark' : 'text-danger'">
            {{ data()!.balanceNeto | currency:'PEN':'symbol':'1.2-2' }}
          </h3>
        </div>
      </div>
    </div>
  </div>
</div>
}
