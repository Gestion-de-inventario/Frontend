<div class="container-fluid py-4">
  @if (!canList && !canCreate) {
    <div class="d-flex flex-column justify-content-center align-items-center mt-5 text-center">
      <div class="bg-danger bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="40" height="40" class="text-danger"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"></path></svg>
      </div>
      <h4 class="fw-bold text-dark mb-2">Acceso Denegado</h4>
      <p class="text-muted mb-4">No tienes permisos para gestionar beneficiarios.</p>
      <a routerLink="/dashboard" class="btn btn-primary px-4 py-2 shadow-sm rounded-pill">Volver al Dashboard</a>
    </div>
  } @else {
    <div class="d-flex flex-column gap-4">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
          <h3 class="fw-bold text-dark mb-1">Gestión de Beneficiarios</h3>
          <p class="text-muted mb-0">Control de personas registradas en el comedor</p>
        </div>
        @if (canCreate) { <app-beneficiary-create-fragment /> }
      </div>
      @if (canList) { <app-beneficiary-list-fragment /> }
    </div>
  }
</div>
