<div class="card p-3 border-0 shadow-sm">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0 text-primary">Control Menú - Paso {{ currentStep() }} de 4</h4>
    <small class="text-muted">{{ today }}</small>
  </div>

  <div class="progress mb-4" style="height: 5px;">
    <div class="progress-bar" [style.width.%]="currentStep() * 25"></div>
  </div>

  @if (loading()) {
    <div class="text-center py-5"><span class="spinner-border text-primary"></span></div>
  } @else {
    @switch (currentStep()) {
      @case (1) {
        <div class="d-flex flex-column gap-3">
          <label class="form-label fw-bold">Plato del día *</label>
          <select class="form-select" [ngModel]="selectedDishMenuId()" (ngModelChange)="selectedDishMenuId.set($event)">
            <option [ngValue]="null" disabled>Seleccione un plato</option>
            @for (dish of dishMenus(); track dish.id) { @if(dish.status === 'ACTIVO') { <option [ngValue]="dish.id">{{ dish.name }}</option> } }
          </select>
          <input type="number" class="form-control" placeholder="Cantidad" [ngModel]="quantityPrepared()" (ngModelChange)="quantityPrepared.set($event)" />
          <button class="btn btn-primary w-100 mt-2" (click)="createReport()" [disabled]="creating()">
            @if (creating()) { Creando... } @else { Crear Reporte y Avanzar }
          </button>
        </div>
      }

      @case (2) {
        <app-menu-report-products-fragment />
        <div class="d-flex justify-content-between mt-3">
          <button class="btn btn-outline-secondary" (click)="prevStep()" [disabled]="currentStep() === 2">Atrás</button>
          <button class="btn btn-primary" (click)="nextStep()">Siguiente: Beneficiarios</button>
        </div>
      }

      @case (3) {
        <app-menu-report-beneficiaries-fragment />
        <div class="d-flex justify-content-between mt-3">
          <button class="btn btn-outline-secondary" (click)="prevStep()">Atrás</button>
          <button class="btn btn-primary" (click)="nextStep()">Siguiente: Resumen</button>
        </div>
      }

      @case (4) {
        <app-menu-report-summary-fragment />
        <div class="mt-3 text-end"><button class="btn btn-outline-secondary" (click)="prevStep()">Atrás</button></div>
      }
    }
  }
</div>
