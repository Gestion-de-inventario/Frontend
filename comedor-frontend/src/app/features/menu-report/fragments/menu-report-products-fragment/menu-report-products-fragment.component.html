<div class="card-body p-0">
  <ul class="list-group list-group-flush">
    @for (record of report()?.registro; track record.id) {
      <li class="list-group-item">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <strong>{{ record.productName }}</strong>
          </div>
          <div class="text-end">
            <div>Uso: {{ record.quantityUsed }}</div>
          </div>
          <div class="text-center">
            <div>{{ record.productUnit }}</div>
          </div>
        </div>
      </li>
    } @empty {
      <li class="list-group-item text-center text-muted">No hay movimientos registrados.</li>
    }
  </ul>
</div>
