<div class="card border-0 shadow-sm rounded-4">
  <div class="card-header bg-white">
    <h5 class="fw-bold mb-3">Tipos de beneficiario</h5>

    <div class="d-flex gap-3">
      <input class="form-control" placeholder="Buscar..." (input)="onSearch($event)" />

      <select class="form-select" style="max-width: 150px" (change)="onStatusChange($event)">
        <option value="TODOS">Todos</option>
        <option value="ACTIVO">Activos</option>
        <option value="INACTIVO">Inactivos</option>
      </select>
    </div>
  </div>

  <div class="card-body">
    @if (loading()) {
      <div class="text-center py-5">
        <div class="spinner-border"></div>
      </div>
    } @else {
      @for (type of types(); track type.id) {
        <div class="border rounded p-3 mb-2" style="cursor: pointer" (click)="openType(type)">
          <div class="d-flex justify-content-between">
            <div>
              <strong>{{ type.name }}</strong>

              <div class="text-muted small">
                {{ type.desc }}
              </div>
            </div>
          </div>
          <span
            class="badge rounded-pill mt-2"
            [class]="
              type.status === 'ACTIVO'
                ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25'
                : 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25'
            "
          >
            {{ type.status }}
          </span>
        </div>
      } @empty {
        <div class="text-center text-muted py-4">No hay registros</div>
      }
    }
  </div>
</div>

<app-beneficiary-type-detail-modal />
