<div class="container py-3">
  @if (!canList) {
    <div class="text-center mt-5">
      <h4>No tienes permisos para este módulo</h4>

      <a routerLink="/dashboard" class="btn btn-primary mt-3"> Volver al dashboard </a>
    </div>
  } @else {
    <div class="d-flex flex-column gap-4">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3"
      >
        <div>
          <h3 class="fw-bold text-dark mb-1">Gestión de Tipos de beneficiarios</h3>
        </div>
        @if (canCreate) {
          <app-beneficiary-type-create-fragment />
        }
      </div>
    </div>

    @if (canList) {
      <app-beneficiary-type-list-fragment />
    }
  }
</div>
